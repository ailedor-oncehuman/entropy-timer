<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>エントロピー探索タイマー</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    font-size:30px;
    margin-bottom:15px;
}

.current-time{
    font-size:18px;
    margin-bottom:25px;
    opacity:0.9;
}

.status{
    font-size:34px;
    font-weight:bold;
    margin-bottom:15px;
}

.ready{
    color:#FFD700;
    text-shadow:
        0 0 10px #FFD700,
        0 0 20px #FFD700;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

.countdown{
    font-size:60px;
    font-weight:bold;
    margin-bottom:20px;
}

.next-time{
    font-size:20px;
    margin-bottom:20px;
}

.schedule{
    text-align:left;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:15px;
    margin-top:20px;
}

.schedule h2{
    font-size:18px;
    margin-bottom:10px;
}

.schedule ul{
    list-style:none;
}

.schedule li{
    padding:4px 0;
}
</style>
</head>

<body>

<div class="container">

    <h1>エントロピー探索タイマー</h1>

    <div class="current-time" id="currentTime">
        現在時刻
    </div>

    <div class="status" id="status">
        計算中...
    </div>

    <div class="countdown" id="countdown">
        00:00:00
    </div>

    <div class="next-time" id="nextTime">
        次回探索可能時刻
    </div>

    <div class="schedule">
        <h2>探索可能時刻</h2>
        <ul>
            <li>01:00</li>
            <li>05:00</li>
            <li>09:00</li>
            <li>13:00</li>
            <li>17:00</li>
            <li>21:00</li>
        </ul>
    </div>

</div>

<script>

const spawnHours = [1,5,9,13,17,21];

function pad(num){
    return String(num).padStart(2,"0");
}

function updateTimer(){

    const now = new Date();

    document.getElementById("currentTime").textContent =
        "現在時刻 " +
        pad(now.getHours()) + ":" +
        pad(now.getMinutes()) + ":" +
        pad(now.getSeconds());

    let nextTime = null;

    for(const hour of spawnHours){

        const candidate = new Date(now);

        candidate.setHours(hour,0,0,0);

        if(candidate > now){
            nextTime = candidate;
            break;
        }
    }

    if(!nextTime){
        nextTime = new Date(now);
        nextTime.setDate(nextTime.getDate()+1);
        nextTime.setHours(1,0,0,0);
    }

    const diff = nextTime - now;

    const hours =
        Math.floor(diff / 1000 / 60 / 60);

    const minutes =
        Math.floor((diff / 1000 / 60) % 60);

    const seconds =
        Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").textContent =
        pad(hours) + ":" +
        pad(minutes) + ":" +
        pad(seconds);

    document.getElementById("nextTime").textContent =
        "次回探索可能時刻 " +
        pad(nextTime.getHours()) +
        ":" +
        pad(nextTime.getMinutes());

    const status = document.getElementById("status");

    if(hours === 0 && minutes === 0 && seconds === 0){
        status.textContent = "探索可能！";
        status.classList.add("ready");
    }else{
        status.textContent = "探索可能まで";
        status.classList.remove("ready");
    }
}

updateTimer();
setInterval(updateTimer,1000);

</script>

</body>
</html>
