<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探索時間タイマー</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="探索時間タイマー">
<meta name="theme-color" content="#050914">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  color:#fff;
  font-family:"Arial Black","Arial Rounded MT Bold","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
  background:#050914;
  overflow-x:hidden;
  text-align:center;
  display:flex;
  justify-content:center;
}

#bgLayer{
  position:fixed;
  inset:-16%;
  z-index:-3;
  background-size:cover;
  background-position:center 30%;
  background-repeat:no-repeat;
  filter:brightness(1.08) contrast(1.08) saturate(1.22);
  animation:bgZoom 90s ease-in-out infinite alternate;
  transition:background-image 1s ease;
}

@keyframes bgZoom{
  from{transform:scale(1.08)}
  to{transform:scale(1.15)}
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-2;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.02) 0%,
    rgba(0,0,0,.08) 28%,
    rgba(0,8,18,.38) 68%,
    rgba(0,8,18,.78) 100%
  );
  pointer-events:none;
}

.app{
  width:min(100%,430px);
  max-width:430px;
  margin:0 auto;
  padding:18px 14px 105px;
}

/* BGM */

.sound-panel{
  position:fixed;
  top:70px;
  right:10px;
  z-index:999;
  width:126px;
}

#bgmBtn{
  width:100%;
  height:44px;
  border-radius:14px;
  border:1px solid #25eaff;
  background:rgba(0,15,28,.84);
  color:#eaffff;
  font-size:13px;
  font-weight:900;
  text-shadow:0 0 3px #28eaff;
  box-shadow:0 0 8px rgba(37,234,255,.45),inset 0 0 8px rgba(37,234,255,.12);
  backdrop-filter:blur(5px);
}

#bgmBtn.playing{
  color:#dfffee;
  border-color:#00ff99;
}

.volume-box{
  display:none;
  margin-top:8px;
  padding:10px;
  border-radius:14px;
  background:rgba(0,15,28,.84);
  border:1px solid rgba(37,234,255,.65);
  backdrop-filter:blur(5px);
}

.sound-panel.open .volume-box{display:block}

.bgm-label{
  text-align:center;
  margin-bottom:8px;
  color:#fff4a8;
  font-size:13px;
  font-weight:900;
  text-shadow:0 0 4px #ffe94d;
}

#volumeSlider{
  width:100%;
  accent-color:#00ff99;
}

/* HEADER */

.header{
  text-align:center;
  padding-top:8px;
  margin-bottom:18px;
}

.once{
  font-size:18px;
  font-weight:900;
  letter-spacing:10px;
  color:#dfffff;
  line-height:1;
  text-shadow:
    0 0 2px #00eaff,
    0 0 6px rgba(0,234,255,.75),
    0 0 12px rgba(0,234,255,.35);
}

.human-word{
  position:relative;
  display:inline-block;
  margin-top:4px;
  font-size:48px;
  font-weight:900;
  letter-spacing:4px;
  line-height:.95;
  color:#eaffff;
  -webkit-text-stroke:.7px rgba(40,234,255,.72);
  text-shadow:
    0 0 2px #00eaff,
    0 0 7px rgba(0,234,255,.75),
    0 0 15px rgba(0,234,255,.38);
}

.human-mark{
  position:absolute;
  left:50%;
  top:52%;
  width:34px;
  height:34px;
  transform:translate(-50%,-50%);
  pointer-events:none;
}

.human-mark::before,
.human-mark::after{
  content:"";
  position:absolute;
  left:1px;
  right:1px;
  height:8px;
  background:#ff2f73;
  box-shadow:0 0 6px rgba(255,47,115,.75);
}

.human-mark::before{top:6px}
.human-mark::after{bottom:6px}

.title{
  margin-top:8px;
  font-size:37px;
  font-weight:900;
  color:#ffeaff;
  letter-spacing:2px;
  -webkit-text-stroke:.8px rgba(255,47,179,.75);
  text-shadow:
    0 0 2px #ff2fb3,
    0 0 7px rgba(255,47,179,.8),
    0 0 15px rgba(255,47,179,.45);
}

/* PANELS */

.panel{
  position:relative;
  background:rgba(0,10,20,.48);
  border:1px solid rgba(40,234,255,.78);
  border-radius:22px;
  box-shadow:
    0 0 10px rgba(40,234,255,.32),
    inset 0 0 16px rgba(40,234,255,.05);
  backdrop-filter:blur(8px);
  overflow:hidden;
}

.panel::before,
.panel::after{
  content:"";
  position:absolute;
  width:46px;
  height:24px;
  border-color:rgba(255,255,255,.86);
  pointer-events:none;
}

.panel::before{
  left:10px;
  top:10px;
  border-left:2px solid;
  border-top:2px solid;
  border-radius:16px 0 0 0;
}

.panel::after{
  right:10px;
  bottom:10px;
  border-right:2px solid;
  border-bottom:2px solid;
  border-radius:0 0 16px 0;
}

.card{
  padding:22px 18px 24px;
}

.current-time{
  font-size:20px;
  font-weight:900;
  margin-bottom:18px;
  color:#f7ffff;
  text-align:center;
  text-shadow:0 0 2px rgba(255,255,255,.8),0 0 7px rgba(255,255,255,.35);
}

.current-time span{
  color:#dfffff;
  margin-right:8px;
  -webkit-text-stroke:.5px rgba(40,234,255,.65);
  text-shadow:0 0 2px #00eaff,0 0 6px rgba(0,234,255,.68);
}

.timer-box{
  padding:22px 10px;
  border-radius:18px;
  margin-bottom:18px;
  background:rgba(0,15,24,.36);
  box-shadow:inset 0 0 18px rgba(0,0,0,.28);
}

.status{
  font-size:29px;
  font-weight:900;
  color:#dfffff;
  margin-bottom:8px;
  -webkit-text-stroke:.6px rgba(40,234,255,.7);
  text-shadow:0 0 2px #00eaff,0 0 7px rgba(0,234,255,.7),0 0 14px rgba(0,234,255,.35);
}

.countdown{
  font-size:48px;
  font-weight:900;
  line-height:1;
  color:#fff1a6;
  -webkit-text-stroke:.8px rgba(255,184,0,.7);
  text-shadow:0 0 2px #ffd84d,0 0 8px rgba(255,216,77,.75),0 0 16px rgba(255,183,0,.45);
}

.progress-wrap{
  margin:18px 0 8px;
  height:20px;
  border-radius:999px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.32);
  overflow:hidden;
  box-shadow:inset 0 0 9px rgba(0,0,0,.48);
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:999px;
  background:linear-gradient(90deg,#00eaff 0%,#00ff99 42%,#ffe600 76%,#ff3030 100%);
  transition:width .5s linear;
}

.progress-text{
  font-size:18px;
  font-weight:900;
  color:#dfffee;
  text-shadow:0 0 2px #00ff99,0 0 7px rgba(0,255,153,.6);
  margin-bottom:14px;
}

.next-time{
  font-size:27px;
  font-weight:900;
  color:#dfffff;
  -webkit-text-stroke:.55px rgba(40,234,255,.65);
  text-shadow:0 0 2px #00eaff,0 0 6px rgba(0,234,255,.68),0 0 12px rgba(0,234,255,.34);
}

#nextHourText{
  display:block;
  margin-top:6px;
  font-size:50px;
  font-weight:900;
  -webkit-text-stroke:.8px currentColor;
  text-shadow:0 0 2px currentColor,0 0 7px currentColor;
}

.schedule{
  margin-top:14px;
  padding:18px;
}

.schedule h2{
  color:#dfffff;
  font-size:27px;
  font-weight:900;
  margin-bottom:18px;
  -webkit-text-stroke:.55px rgba(40,234,255,.65);
  text-shadow:0 0 2px #00eaff,0 0 6px rgba(0,234,255,.68),0 0 12px rgba(0,234,255,.34);
}

.time-list{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

.time-item{
  padding:14px 6px;
  border-radius:14px;
  background:rgba(3,12,22,.55);
  border:1px solid rgba(255,255,255,.25);
  font-size:20px;
  font-weight:900;
}

.note{
  margin-top:14px;
  padding:16px;
  font-size:15px;
  line-height:1.7;
  text-align:left;
}

.ready-panel{
  border:1px solid #00ff99 !important;
  box-shadow:0 0 10px #00ff99,0 0 20px rgba(0,255,153,.65),inset 0 0 16px rgba(0,255,153,.2);
}

.ready-overlay{
  position:fixed;
  inset:0;
  z-index:998;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,20,12,.44);
  backdrop-filter:blur(3px);
}

.ready-overlay.show{
  display:flex;
  animation:overlayFade 2s ease forwards;
}

.ready-card{
  padding:30px 36px;
  border-radius:22px;
  background:rgba(0,30,20,.9);
  border:2px solid #00ff99;
  color:#eafff5;
  font-size:38px;
  font-weight:900;
  box-shadow:0 0 16px #00ff99,0 0 34px rgba(0,255,153,.52);
  text-shadow:0 0 8px #00ff99;
}

@keyframes overlayFade{
  0%{opacity:0}
  15%{opacity:1}
  80%{opacity:1}
  100%{opacity:0}
}

@media(min-width:700px){
  .sound-panel{
    position:absolute;
    top:62px;
    right:calc(50% - 210px);
  }
}
</style>
</head>

<body>

<div id="bgLayer"></div>

<audio id="bgm" loop preload="auto" playsinline></audio>
<audio id="warningSound" preload="auto" src="warning.mp3"></audio>
<audio id="readySound" preload="auto" src="ready.mp3"></audio>

<div class="sound-panel" id="soundPanel">
  <button id="bgmBtn">▶ BGM再生</button>
  <div class="volume-box">
    <div class="bgm-label" id="bgmLabel">BGM</div>
    <input id="volumeSlider" type="range" min="0" max="100" value="18">
  </div>
</div>

<div class="ready-overlay" id="readyOverlay">
  <div class="ready-card">探索可能！</div>
</div>

<div class="app">

  <div class="header">
    <div class="once">ONCE</div>
    <div class="human-word">HUMAN<span class="human-mark"></span></div>
    <div class="title">探索タイマー</div>
  </div>

  <div class="card panel">
    <div class="current-time" id="currentTime">現在時刻 --:--:--</div>

    <div class="timer-box" id="timerBox">
      <div class="status" id="status">探索可能まで</div>
      <div class="countdown" id="countdown">00:00:00</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="progress-text" id="progressText">進捗 0%</div>

    <div class="next-time" id="nextTime">次回探索可能時間 --:--</div>
  </div>

  <div class="schedule panel">
    <h2>探索可能時間一覧</h2>
    <div class="time-list" id="timeList"></div>
  </div>

  <div class="note panel">🔊 60秒前・30秒前・10秒前に警告音、時間になると通知音が鳴ります。</div>

</div>

<script>
const spawnHours = [1,5,9,13,17,21];
const readyWindowSeconds = 60;

const backgrounds = {
  1:"IMG_7432.jpeg",
  5:"IMG_7433.jpeg",
  9:"IMG_7434.jpeg",
  13:"IMG_7435.jpeg",
  17:"IMG_7436.jpeg",
  21:"IMG_7437.jpeg"
};

const timeColors = {
  1:"#28EAFF",
  5:"#FF5FCB",
  9:"#28EAFF",
  13:"#F4FF35",
  17:"#FFB000",
  21:"#B57CFF"
};

const dayHours = [5,9,13,17];

const bgmCandidates = {
  day:["day_bgm.mp3"],
  night:["night_bgm.mp3","bgm.mp3"]
};

const bgm = document.getElementById("bgm");
const bgmBtn = document.getElementById("bgmBtn");
const volumeSlider = document.getElementById("volumeSlider");
const warningSound = document.getElementById("warningSound");
const readySound = document.getElementById("readySound");
const soundPanel = document.getElementById("soundPanel");
const bgmLabel = document.getElementById("bgmLabel");
const readyOverlay = document.getElementById("readyOverlay");

let bgmPlaying = false;
let currentMode = "";
let currentBgmFile = "";
let selectedFile = {day:"day_bgm.mp3",night:""};
let lastTargetKey = "";
let playedReadyKey = "";
let playedWarnings = {};

function pad(num){
  return String(num).padStart(2,"0");
}

function setVolume(value){
  const volume = Number(value) / 100;
  bgm.volume = volume;
  warningSound.volume = Math.min(volume + .15,1);
  readySound.volume = Math.min(volume + .2,1);
}

const savedVolume = localStorage.getItem("timerVolume");
if(savedVolume !== null) volumeSlider.value = savedVolume;
setVolume(volumeSlider.value);

volumeSlider.addEventListener("input",()=>{
  setVolume(volumeSlider.value);
  localStorage.setItem("timerVolume",volumeSlider.value);
});

function getSpawnTimes(now){
  let last = null;
  let next = null;

  for(const hour of spawnHours){
    const candidate = new Date(now);
    candidate.setHours(hour,0,0,0);
    if(candidate <= now) last = candidate;
    if(candidate > now && !next) next = candidate;
  }

  if(!last){
    last = new Date(now);
    last.setDate(last.getDate()-1);
    last.setHours(21,0,0,0);
  }

  if(!next){
    next = new Date(now);
    next.setDate(next.getDate()+1);
    next.setHours(1,0,0,0);
  }

  return {last,next};
}

function getMode(hour){
  return dayHours.includes(hour) ? "day" : "night";
}

function updateBgmLabel(hour){
  const mode = getMode(hour);
  bgmLabel.textContent = mode === "day" ? "☀️ DAY BGM" : "🌙 NIGHT BGM";
}

function prepareBgm(hour){
  const mode = getMode(hour);
  updateBgmLabel(hour);

  if(currentMode !== mode && !bgmPlaying){
    currentMode = mode;
    const file = selectedFile[mode] || bgmCandidates[mode][0];
    currentBgmFile = file;
    bgm.src = file;
    bgm.load();
  }
}

async function startBgm(hour){
  const mode = getMode(hour);
  currentMode = mode;
  updateBgmLabel(hour);

  const files = selectedFile[mode]
    ? [selectedFile[mode], ...bgmCandidates[mode].filter(f=>f !== selectedFile[mode])]
    : bgmCandidates[mode];

  for(const file of files){
    try{
      currentBgmFile = file;
      bgm.src = file;
      bgm.load();
      bgm.muted = false;
      bgm.currentTime = 0;
      await bgm.play();
      selectedFile[mode] = file;
      return true;
    }catch(e){}
  }

  return false;
}

bgmBtn.addEventListener("click", async ()=>{
  soundPanel.classList.toggle("open");

  if(bgmPlaying){
    bgm.pause();
    bgmPlaying = false;
    bgmBtn.textContent = "▶ BGM再生";
    bgmBtn.classList.remove("playing");
    return;
  }

  const now = new Date();
  const {last,next} = getSpawnTimes(now);
  const secondsSinceLast = Math.floor((now-last)/1000);
  const isReady = secondsSinceLast >= 0 && secondsSinceLast < readyWindowSeconds;
  const hour = isReady ? last.getHours() : next.getHours();

  const success = await startBgm(hour);

  if(success){
    bgmPlaying = true;
    bgmBtn.textContent = "🔇 BGM停止";
    bgmBtn.classList.add("playing");
  }else{
    bgmBtn.textContent = "音源なし";
  }
});

function playOnce(audio){
  try{
    audio.currentTime = 0;
    audio.play();
  }catch(e){}
}

function showReadyOverlay(){
  readyOverlay.classList.remove("show");
  void readyOverlay.offsetWidth;
  readyOverlay.classList.add("show");
  setTimeout(()=>readyOverlay.classList.remove("show"),2200);

  if(navigator.vibrate){
    navigator.vibrate([250,100,250]);
  }
}

function createTimeList(activeHour){
  const list = document.getElementById("timeList");
  list.innerHTML = "";

  spawnHours.forEach(hour=>{
    const item = document.createElement("div");
    item.className = "time-item";
    item.textContent = pad(hour) + ":00";
    item.style.color = timeColors[hour];
    item.style.textShadow = "0 0 2px " + timeColors[hour];

    if(hour === activeHour){
      item.style.borderColor = timeColors[hour];
      item.style.boxShadow = "0 0 8px " + timeColors[hour];
    }

    list.appendChild(item);
  });
}

function updateProgressColor(progress){
  const bar = document.getElementById("progressBar");

  if(progress >= 98){
    bar.style.background = "linear-gradient(90deg,#ff4d4d,#ff9a3c)";
  }else if(progress >= 90){
    bar.style.background = "linear-gradient(90deg,#ffd84d,#ff9a3c)";
  }else if(progress >= 70){
    bar.style.background = "linear-gradient(90deg,#28EAFF,#00ff99)";
  }else{
    bar.style.background = "linear-gradient(90deg,#28EAFF,#40E8FF)";
  }
}

async function syncPlayingBgm(hour){
  if(!bgmPlaying) return;

  const mode = getMode(hour);
  if(mode === currentMode) return;

  const success = await startBgm(hour);
  if(!success){
    bgmPlaying = false;
    bgmBtn.textContent = "音源なし";
    bgmBtn.classList.remove("playing");
  }
}

function updateTimer(){
  const now = new Date();
  const {last,next} = getSpawnTimes(now);

  const secondsSinceLast = Math.floor((now-last)/1000);
  const isReady = secondsSinceLast >= 0 && secondsSinceLast < readyWindowSeconds;

  const displayTime = isReady ? last : next;
  const displayHour = displayTime.getHours();
  const targetKey = displayTime.toDateString() + "-" + displayHour;

  if(lastTargetKey !== targetKey){
    playedWarnings = {};
    lastTargetKey = targetKey;
  }

  document.getElementById("currentTime").innerHTML =
    "<span>現在時刻</span> " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());

  document.getElementById("bgLayer").style.backgroundImage =
    "url('" + backgrounds[displayHour] + "')";

  prepareBgm(displayHour);
  syncPlayingBgm(displayHour);

  const status = document.getElementById("status");
  const countdown = document.getElementById("countdown");
  const timerBox = document.getElementById("timerBox");

  status.className = "status";
  countdown.className = "countdown";
  timerBox.classList.remove("ready-panel");

  if(isReady){
    status.textContent = "探索可能！";
    countdown.textContent = "00:00:00";
    timerBox.classList.add("ready-panel");

    if(playedReadyKey !== targetKey){
      playOnce(readySound);
      showReadyOverlay();
      playedReadyKey = targetKey;
    }

    document.getElementById("progressBar").style.width = "100%";
    document.getElementById("progressText").textContent = "進捗 100%";
    updateProgressColor(100);
  }else{
    const totalSeconds = Math.floor((next-now)/1000);
    const h = Math.floor(totalSeconds/3600);
    const m = Math.floor((totalSeconds%3600)/60);
    const s = totalSeconds%60;

    status.textContent = "探索可能まで";
    countdown.textContent = pad(h) + ":" + pad(m) + ":" + pad(s);

    [60,30,10].forEach(mark=>{
      if(totalSeconds === mark && !playedWarnings[mark]){
        playOnce(warningSound);
        playedWarnings[mark] = true;
      }
    });

    const period = next-last;
    const elapsed = now-last;
    const progress = Math.max(0,Math.min(100,Math.floor((elapsed/period)*100)));

    document.getElementById("progressBar").style.width = progress + "%";
    document.getElementById("progressText").textContent = "進捗 " + progress + "%";
    updateProgressColor(progress);
  }

  document.getElementById("nextTime").innerHTML =
    '次回探索可能時間<br><span id="nextHourText">' + pad(displayHour) + ':00</span>';

  const nextHourText = document.getElementById("nextHourText");
  nextHourText.style.color = timeColors[displayHour];
  nextHourText.style.textShadow = "0 0 7px " + timeColors[displayHour];

  createTimeList(displayHour);
}

updateTimer();
setInterval(updateTimer,1000);
</script>

</body>
</html>
