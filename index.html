<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>探索時間タイマー</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  background-attachment:fixed;
  transition:background-image 1s ease;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  z-index:-1;
}

.container{
  width:100%;
  max-width:520px;
  padding:28px 20px;
  border-radius:26px;
  text-align:center;
  background:rgba(5,15,30,.72);
  border:1px solid rgba(0,220,255,.65);
  box-shadow:0 0 28px rgba(0,220,255,.45);
  backdrop-filter:blur(6px);
}

h1{
  font-size:34px;
  margin-bottom:18px;
  text-shadow:0 0 18px #60eaff;
}

.current-time{
  font-size:18px;
  margin-bottom:20px;
}

.status{
  font-size:30px;
  font-weight:bold;
  color:#28eaff;
  margin-bottom:10px;
}

.countdown{
  font-size:62px;
  font-weight:900;
  color:#ffd45c;
  text-shadow:0 0 22px #ffb700;
  margin-bottom:16px;
}

.next-time{
  font-size:22px;
  margin-bottom:20px;
}

.warning{
  color:#ffd84d !important;
  text-shadow:0 0 18px #ffd84d;
}

.danger{
  color:#ff4d4d !important;
  text-shadow:0 0 18px #ff4d4d;
  animation:blink .8s infinite;
}

.ready{
  color:#00ff99 !important;
  text-shadow:0 0 18px #00ff99,0 0 38px #00ff99;
  animation:pulse .8s infinite;
}

@keyframes blink{
  50%{opacity:.35}
}

@keyframes pulse{
  50%{transform:scale(1.06)}
}

.schedule{
  margin-top:18px;
  padding:16px;
  border-radius:18px;
  background:rgba(0,10,24,.58);
  border:1px solid rgba(0,220,255,.4);
}

.schedule h2{
  color:#28eaff;
  margin-bottom:12px;
}

.time-list{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.time-item{
  padding:12px 6px;
  border-radius:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.22);
  font-size:18px;
}

.time-item.active{
  color:#00eaff;
  border-color:#00eaff;
  box-shadow:0 0 16px rgba(0,234,255,.7);
  font-weight:bold;
}

.note{
  margin-top:16px;
  font-size:13px;
  opacity:.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>探索時間タイマー</h1>

  <div class="current-time" id="currentTime">現在時刻 --:--:--</div>

  <div class="status" id="status">探索可能まで</div>

  <div class="countdown" id="countdown">00:00:00</div>

  <div class="next-time" id="nextTime">次回探索可能時刻 --:--</div>

  <div class="schedule">
    <h2>探索可能時刻一覧</h2>
    <div class="time-list" id="timeList"></div>
  </div>

  <div class="note">残り5分で黄色、残り1分で赤色、時間になると探索可能！</div>
</div>

<script>
const spawnHours = [1,5,9,13,17,21];

const backgrounds = {
  1: "IMG_7432.jpeg",
  5: "IMG_7433.jpeg",
  9: "IMG_7434.jpeg",
  13: "IMG_7435.jpeg",
  17: "IMG_7436.jpeg",
  21: "IMG_7437.jpeg"
};

function pad(num){
  return String(num).padStart(2,"0");
}

function createTimeList(activeHour){
  const list = document.getElementById("timeList");
  list.innerHTML = "";

  spawnHours.forEach(hour=>{
    const item = document.createElement("div");
    item.className = "time-item";

    if(hour === activeHour){
      item.classList.add("active");
    }

    item.textContent = pad(hour) + ":00";
    list.appendChild(item);
  });
}

function updateTimer(){
  const now = new Date();

  document.getElementById("currentTime").textContent =
    "現在時刻 " +
    pad(now.getHours()) + ":" +
    pad(now.getMinutes()) + ":" +
    pad(now.getSeconds());

  let nextTime = null;

  for(const hour of spawnHours){
    const candidate = new Date(now);
    candidate.setHours(hour,0,0,0);

    if(candidate > now){
      nextTime = candidate;
      break;
    }
  }

  if(!nextTime){
    nextTime = new Date(now);
    nextTime.setDate(nextTime.getDate()+1);
    nextTime.setHours(1,0,0,0);
  }

  const totalSeconds = Math.floor((nextTime - now) / 1000);

  const hours = Math.floor(totalSeconds / 3600);
  const minutes = Math.floor((totalSeconds % 3600) / 60);
  const seconds = totalSeconds % 60;

  const status = document.getElementById("status");
  const countdown = document.getElementById("countdown");

  status.className = "status";
  countdown.className = "countdown";

  if(totalSeconds <= 0){
    status.textContent = "★★★★★ 探索可能！ ★★★★★";
    status.classList.add("ready");
    countdown.textContent = "00:00:00";
  }else{
    status.textContent = "探索可能まで";

    countdown.textContent =
      pad(hours) + ":" +
      pad(minutes) + ":" +
      pad(seconds);

    if(totalSeconds <= 60){
      status.classList.add("danger");
      countdown.classList.add("danger");
    }else if(totalSeconds <= 300){
      status.classList.add("warning");
      countdown.classList.add("warning");
    }
  }

  document.getElementById("nextTime").textContent =
    "次回探索可能時刻 " + pad(nextTime.getHours()) + ":00";

  createTimeList(nextTime.getHours());

  document.body.style.backgroundImage =
    "url('" + backgrounds[nextTime.getHours()] + "')";
}

updateTimer();
setInterval(updateTimer,1000);
</script>

</body>
</html>
